name: product-evidence-platform

services:
  browser:
    build:
      context: .
      dockerfile: docker/browser.Dockerfile
    init: true
    shm_size: "2gb"
    expose:
      - "9000"
    environment:
      ARTIFACT_ROOT: /data/artifacts
      BROWSER_HEADLESS: "true"
      BROWSER_MAX_CONTEXTS: "${BROWSER_MAX_CONTEXTS:-3}"
      BROWSER_NAVIGATION_TIMEOUT_MS: "${BROWSER_NAVIGATION_TIMEOUT_MS:-60000}"
      BROWSER_ACTION_TIMEOUT_MS: "${BROWSER_ACTION_TIMEOUT_MS:-8000}"
      BROWSER_API_TOKEN_FILE: /run/secrets/browser_api_token
    volumes:
      - ./artifacts:/data/artifacts
    secrets:
      - browser_api_token
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
    init: true
    ports:
      - "${AGENT_HOST_PORT:-8788}:8000"
    env_file:
      - .env
    environment:
      ARTIFACT_ROOT: /data/artifacts
      PRIVATE_FEATURE_ROOT: /data/private
      BROWSER_BASE_URL: http://browser:9000
      BROWSER_API_TOKEN_FILE: /run/secrets/browser_api_token
      PRODUCT_HARNESS_ENABLE_BROWSER_SERVICE: "true"
      PRODUCT_HARNESS_ENABLE_VISION_REASONING: "${PRODUCT_HARNESS_ENABLE_VISION_REASONING:-true}"
      PRODUCT_HARNESS_BROWSER_CANDIDATE_LIMIT: "${PRODUCT_HARNESS_BROWSER_CANDIDATE_LIMIT:-3}"
    volumes:
      - ./artifacts:/data/artifacts
      - ./inputs/private:/data/private:ro
    secrets:
      - browser_api_token
    depends_on:
      browser:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

secrets:
  browser_api_token:
    file: ./secrets/browser_api_token.txt
