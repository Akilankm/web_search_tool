name: product-url-resolver

services:
  browser:
    build:
      context: .
      dockerfile: docker/browser.Dockerfile
    init: true
    user: "${RUNTIME_UID_BROWSER:-10002}:${RUNTIME_GID:-10000}"
    shm_size: "2gb"
    environment:
      HOME: /tmp/browser-home
      PRODUCT_URL_ARTIFACT_ROOT: /data/artifacts
      BROWSER_API_TOKEN_FILE: /run/secrets/browser_api_token
      BROWSER_NAVIGATION_TIMEOUT_MS: "${BROWSER_NAVIGATION_TIMEOUT_MS:-60000}"
      BROWSER_ACTION_TIMEOUT_MS: "${BROWSER_ACTION_TIMEOUT_MS:-10000}"
    volumes:
      - ./data/artifacts:/data/artifacts
    secrets:
      - browser_api_token
    expose: ["9000"]
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  agent:
    build:
      context: .
      dockerfile: docker/agent.Dockerfile
    init: true
    user: "${RUNTIME_UID_AGENT:-10001}:${RUNTIME_GID:-10000}"
    env_file: [.env]
    environment:
      PRODUCT_URL_CONFIG: /app/config/default.json
      PRODUCT_URL_ARTIFACT_ROOT: /data/artifacts
      PRODUCT_URL_FEATURE_SET_ROOT: /app/feature_sets
      PRODUCT_URL_BROWSER_BASE_URL: http://browser:9000
      BROWSER_API_TOKEN_FILE: /run/secrets/browser_api_token
    volumes:
      - ./data/artifacts:/data/artifacts
    secrets:
      - browser_api_token
    ports:
      - "${PRODUCT_URL_HOST_PORT:-8788}:8000"
    depends_on:
      browser:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    init: true
    user: "${RUNTIME_UID_UI:-10003}:${RUNTIME_GID:-10000}"
    environment:
      PRODUCT_URL_API_URL: http://agent:8000
    ports:
      - "${PRODUCT_URL_UI_PORT:-8501}:8501"
    depends_on:
      agent:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

secrets:
  browser_api_token:
    file: ./secrets/browser_api_token.txt
