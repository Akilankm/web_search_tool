[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "product-url-resolver"
version = "2.0.0"
description = "Notebook-first exact product URL resolver"
requires-python = ">=3.10,<3.13"
dependencies = [
  "beautifulsoup4>=4.12,<5",
  "openai>=1,<3",
  "pandas>=2.2,<3",
  "playwright>=1.52,<2",
  "python-dotenv>=1.0,<2",
  "requests>=2.32,<3"
]

[project.optional-dependencies]
notebook = [
  "ipykernel>=6,<8",
  "jupyterlab>=4,<5",
  "nbclient>=0.10,<1",
  "nbformat>=5.10,<6"
]
dev = [
  "pytest>=8,<9",
  "pytest-cov>=5,<7",
  "nbclient>=0.10,<1",
  "nbformat>=5.10,<6"
]

[project.scripts]
product-url = "product_url_v2.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"
