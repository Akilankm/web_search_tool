[project]
name = "product-evidence-platform"
version = "0.8.0"
description = "Azure ML product evidence platform with exact-product resolution, multimodal browser investigation, auditable decisions, notebooks, and a browser application"
requires-python = ">=3.10,<3.12"
dependencies = [
    "requests>=2.32.0,<3",
    "python-dotenv>=1.0.1,<2",
    "loguru>=0.7.2,<1",
    "rich>=13.7.1,<15",
    "pandas>=2.2.0,<3",
    "matplotlib>=3.8.0,<4",
    "seaborn>=0.13.2,<1",
    "plotly>=5.24.0,<7",
    "ipywidgets>=8.1.0,<9",
    "ipython>=8.20.0,<10",
    "openpyxl>=3.1.5,<4",
    "tqdm>=4.66.0,<5",
    "openai>=1.0.0,<3",
    "httpx>=0.27.0,<1",
    "fastapi>=0.115.0,<1",
    "uvicorn[standard]>=0.30.0,<1",
    "playwright==1.52.0",
    "pillow>=11.0.0,<12",
    "streamlit>=1.41.0,<2",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0,<9",
    "pytest-asyncio>=0.25.0,<1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"

[tool.setuptools.package-data]
product_evidence_harness = ["configs/*.json"]
