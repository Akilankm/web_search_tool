name: tests

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            requests python-dotenv loguru rich nest-asyncio \
            pandas openpyxl tqdm openai httpx pytest
      - name: Compile
        run: PYTHONPATH=src python -m compileall -q src scripts main.py batch_main.py
      - name: Run focused production-contract tests
        run: |
          PYTHONPATH=src pytest -q \
            tests/test_serp_harvester.py \
            tests/test_one_credit_feature_workflow.py \
            tests/test_environment_security.py \
            tests/test_env_example_contract.py \
            tests/test_llm_feature_reasoner.py \
            --junitxml=focused-report-${{ matrix.python-version }}.xml
      - name: Run full unit suite
        run: PYTHONPATH=src pytest -q --junitxml=pytest-report-${{ matrix.python-version }}.xml
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: |
            focused-report-${{ matrix.python-version }}.xml
            pytest-report-${{ matrix.python-version }}.xml
          if-no-files-found: warn
