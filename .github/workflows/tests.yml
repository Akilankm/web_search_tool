name: tests
on:
  pull_request:
  push:
    branches: [master]

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Compile
        run: python -m compileall -q src apps scripts
      - name: Validate JSON
        run: |
          python -m json.tool config/default.json >/dev/null
          for file in feature_sets/*.json; do python -m json.tool "$file" >/dev/null; done
      - name: Validate shell
        run: bash -n scripts/start.sh scripts/run_ui.sh scripts/validate_release.sh
      - name: Validate Compose
        run: |
          cp .env.example .env
          mkdir -p secrets data/artifacts
          printf 'ci-token\n' > secrets/browser_api_token.txt
          docker compose config --quiet
      - name: Enforce canonical architecture
        run: python scripts/check_architecture.py
      - name: Acceptance contract
        run: >-
          pytest -q
          tests/test_acceptance_policy.py
          tests/test_mandatory_url_delivery.py
          tests/test_rendered_source_classification.py
      - name: Test
        shell: bash
        run: |
          set +e
          pytest -q --junitxml=test-results.xml > test-output.txt 2>&1
          status=$?
          cat test-output.txt
          exit "$status"
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: |
            test-output.txt
            test-results.xml
          if-no-files-found: ignore
          retention-days: 7
      - name: Reject legacy references
        run: |
          if grep -RInE 'product_evidence_harness|compat_patches|monkey_patch|monkeypatch_runtime' src apps scripts docker docs README.md pyproject.toml docker-compose.yml; then exit 1; fi
