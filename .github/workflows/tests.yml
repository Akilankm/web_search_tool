name: tests
on:
  pull_request:
  push:
    branches: [master]

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install notebook-first runtime
        run: python -m pip install -e '.[dev]'
      - name: Compile Python
        run: python -m compileall -q src scripts
      - name: Validate JSON
        run: |
          python -m json.tool config/default.json >/dev/null
          for file in feature_sets/*.json; do python -m json.tool "$file" >/dev/null; done
      - name: Validate shell
        run: bash -n scripts/validate_release.sh
      - name: Enforce canonical architecture
        run: python scripts/check_architecture.py
      - name: Validate notebooks
        run: python scripts/validate_notebooks.py
      - name: Acceptance and notebook contract
        run: >-
          pytest -q
          tests/test_acceptance_policy.py
          tests/test_mandatory_url_delivery.py
          tests/test_rendered_source_classification.py
          tests/test_release_consistency.py
          tests/test_notebook_runtime.py
      - name: Complete test suite
        shell: bash
        run: |
          set +e
          pytest -q --junitxml=test-results.xml > test-output.txt 2>&1
          status=$?
          cat test-output.txt
          exit "$status"
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: |
            test-output.txt
            test-results.xml
          if-no-files-found: ignore
          retention-days: 7
      - name: Reject removed infrastructure
        run: |
          test ! -e docker-compose.yml
          test ! -e apps/product_url_ui.py
          test ! -e src/product_url_v2/api.py
          test ! -e src/product_url_v2/browser_service.py
          test ! -e scripts/start.sh
          test ! -e scripts/run_ui.sh
          if grep -RInE 'product_evidence_harness|compat_patches|monkey_patch|monkeypatch_runtime|nest_asyncio' src scripts; then exit 1; fi
